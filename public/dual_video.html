<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MQAD - 雙影片佈局</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .carousel-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
        .carousel-inner { display: flex; height: 100%; }
        .carousel-item { flex: 0 0 100%; height: 100%; }
        .carousel-item video, .carousel-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            display: block;
        }
        
        #header-container, #header-1-container, #footer-container, 
        #slot-bottom-left, #slot-bottom-right {
            min-height: 0;
            min-width: 0;
        }
        
        #bottom-row {
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="h-full w-screen flex flex-col bg-black relative">
        <!-- Debug info overlay -->
        <div id="debug-overlay" style="display: none; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 9999; font-family: monospace;">
            <div><strong>Device ID:</strong> <span id="debug-device-id">-</span></div>
            <div><strong>Layout:</strong> <span id="debug-layout">-</span></div>
            <div><strong>Status:</strong> <span id="debug-status">Loading...</span></div>
        </div>

        <!-- 頁首影片區 -->
        <div id="header-container" class="h-[25vh] relative flex-shrink-0"></div>

        <!-- 第二頁首影片區 -->
        <div id="header-1-container" class="h-[25vh] relative flex-shrink-0"></div>

        <!-- 底部左右輪播區 -->
        <div id="bottom-row" class="flex-1 flex">
            <div id="slot-bottom-left" class="flex-1 relative"></div>
            <div id="slot-bottom-right" class="flex-1 relative"></div>
        </div>

        <!-- 頁尾內容區 -->
        <div id="footer-container" class="h-[10vh] relative flex-shrink-0"></div>

    </div>

    <script src="js/animation.js"></script>

</body>
</html>
