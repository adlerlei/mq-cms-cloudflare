<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MQAD - 駕訓班交通安全宣導</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        .carousel-container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden; 
        }
        .carousel-inner { 
            display: flex; 
            height: 100%;
        }
        .carousel-item { 
            flex: 0 0 100%; 
            height: 100%; 
        }
        .carousel-item video, .carousel-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            display: block;
            background-color: black;
        }
        
        #slot-zone-1, #slot-zone-2 {
            min-height: 0;
            min-width: 0;
        }
    </style>
</head>
<body>
    <div class="h-full w-screen flex flex-col bg-black relative">
        <!-- Debug info overlay -->
        <div id="debug-overlay" style="display: none; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-size: 12px; z-index: 9999; font-family: monospace;">
            <div><strong>Device ID:</strong> <span id="debug-device-id">-</span></div>
            <div><strong>Layout:</strong> <span id="debug-layout">-</span></div>
            <div><strong>Template:</strong> driving_school (駕訓班)</div>
            <div><strong>Status:</strong> <span id="debug-status">Loading...</span></div>
        </div>

        <!-- 上區塊 (29.69vh = 570/1920) - 標題圖片 -->
        <div id="slot-zone-1" class="h-[29.69vh] relative flex-shrink-0"></div>

        <!-- 下區塊 (70.31vh = 1350/1920) - A4 宣傳文宣 -->
        <div id="slot-zone-2" class="h-[70.31vh] relative flex-shrink-0"></div>
    </div>

    <script src="js/animation.js"></script>

</body>
</html>
