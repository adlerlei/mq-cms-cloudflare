<!doctype html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MQAD - 駕訓班交通安全宣導</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: black;
        }
        .carousel-container { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            overflow: hidden; 
        }
        .carousel-inner { 
            display: flex; 
            height: 100%;
            width: 100%;
        }
        .carousel-item { 
            flex: 0 0 100%; 
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .carousel-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            display: block;
            background-color: black;
        }
        .carousel-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background-color: black;
        }
        
        /* 上下兩區塊佈局 */
        #slot-zone-1 {
            width: 100%;
            height: 570px;
            position: relative;
            overflow: hidden;
            background-color: black;
        }
        
        #slot-zone-2 {
            width: 100%;
            height: 1350px;
            position: relative;
            overflow: hidden;
            background-color: black;
        }
    </style>
</head>
<body>
    <div style="width: 100vw; height: 100vh; overflow: hidden; background-color: black; position: relative;">
        <!-- Debug info overlay -->
        <div id="debug-overlay" style="display: none; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 5px; font-size: 11px; z-index: 9999; font-family: monospace; max-width: 400px; max-height: 90vh; overflow-y: auto;">
            <div><strong>Device ID:</strong> <span id="debug-device-id">-</span></div>
            <div><strong>Layout:</strong> <span id="debug-layout">-</span></div>
            <div><strong>Template:</strong> driving_school (駕訓班)</div>
            <div><strong>Status:</strong> <span id="debug-status">Loading...</span></div>
            <hr style="border-color: #555; margin: 10px 0;">
            <div id="debug-sections"></div>
        </div>

        <!-- 上區塊 (570px) - 標題圖片 -->
        <div id="slot-zone-1"></div>

        <!-- 下區塊 (1350px) - A4 宣傳文宣 -->
        <div id="slot-zone-2"></div>

    </div>

    <script src="js/animation.js"></script>

</body>
</html>
