# wrangler.toml

name = "mq-cms"
main = "src/index.ts"
compatibility_date = "2024-07-08"

# 綁定 Durable Object
[[durable_objects.bindings]]
name = "MESSAGE_BROADCASTER"
class_name = "MessageBroadcaster"

# 綁定 R2 儲存桶
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "mq-cms-media"

# 靜態資源配置 - 正確的 assets 語法
[assets]
directory = "./public"
binding = "ASSETS"

# 【修正這個區塊】
# 這次我們使用一個新的 tag (v2) 來強制執行新的遷移
[[migrations]]
tag = "v2"
new_sqlite_classes = ["MessageBroadcaster"]

# ==========================================
#  從指令產生的 KV 設定 (Final KV Settings)
# ==========================================

# 用於儲存版面 (Layouts) 的資料
[[kv_namespaces]]
binding = "layout" 
id = "c2832969aef948f1b080d217eb57142f"

# 用於儲存設備 (Devices) 指派關係的資料
[[kv_namespaces]]
binding = "device"
id = "df78697054c74d40953e1ff58cea5a0e"